<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcana Record Games</title>

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0b1020;
      color:#f8fafc;
      font-family:"Noto Sans JP", sans-serif;
      text-align:center;
      padding:20px;
      box-sizing:border-box;
    }

    .container{
      width:100%;
      max-width:900px;
      padding:24px;
    }

    .studio{
      color:#94a3b8;
      letter-spacing:0.2em;
      font-size:14px;
      margin-bottom:18px;
    }

    /* PROJECT STARTED */
    .project{
      display:inline-block;
      padding:6px 14px;
      border:1px solid #475569;
      border-radius:999px;
      color:#cbd5e1;
      font-size:12px;
      letter-spacing:0.18em;
      margin-bottom:8px;
      background:#111827;
    }

    .project-jp{
      color:#94a3b8;
      font-size:14px;
      margin-bottom:18px;
      letter-spacing:0.08em;
    }

/* タイトル（スマホ対応＋背景発光） */
.title{
  position:relative;
  display:inline-block;
  z-index:1;

  font-size:clamp(2.2rem, 8vw, 4.5rem);
  font-weight:700;
  letter-spacing:0.06em;
  margin:14px 0 12px;
  line-height:1.1;
  text-align:center;
  word-break:keep-all;
  color:#f8fafc;

  /* 文字の発光 */
  text-shadow:
    0 0 6px rgba(148,163,184,.35),
    0 0 14px rgba(96,165,250,.18),
    0 0 28px rgba(59,130,246,.10);
}

/* タイトルの真後ろに被さる光 */
.title::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);

  width:clamp(140px, 28vw, 220px);
  height:clamp(140px, 28vw, 220px);
  border-radius:50%;

  background:radial-gradient(
    circle,
    rgba(255,255,255,0.72) 0%,
    rgba(220,240,255,0.48) 14%,
    rgba(150,205,255,0.28) 34%,
    rgba(96,165,250,0.14) 56%,
    rgba(59,130,246,0.06) 72%,
    rgba(11,16,32,0) 86%
  );

  filter:blur(20px);
  z-index:-1;
  pointer-events:none;
}

  filter:blur(18px);
  z-index:-1;
  pointer-events:none;
}

    .subtitle{
      font-size:clamp(1.2rem, 3.5vw, 1.8rem);
      margin-top:6px;
      margin-bottom:28px;
      color:#e2e8f0;
      letter-spacing:0.04em;
    }

    .status{
      display:inline-block;
      padding:12px 20px;
      border:1px solid #334155;
      border-radius:14px;
      background:#111827;
      color:#cbd5e1;
      font-weight:600;
      min-width:220px;
    }

    .copyright{
      margin-top:32px;
      font-size:12px;
      color:#64748b;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="studio">Arcana Record Games</div>

    <div class="project">PROJECT STARTED</div>
    <div class="project-jp">プロジェクト始動</div>

    <h1 class="title">『アルカナレコード』</h1>
    <div class="subtitle">シリーズ開発中</div>

    <div class="status">公式サイト公開中</div>

    <div class="copyright">© Arcana Record Games</div>
  </div>
</body>
</html>
