<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcana Record Games</title>
  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0b1020;
      color:#f8fafc;
      font-family:"Noto Sans JP", sans-serif;
      text-align:center;
    }
    .container{
      padding:24px;
    }
    .studio{
      color:#94a3b8;
      letter-spacing:0.2em;
      font-size:14px;
      margin-bottom:20px;
    }
    .title{
      font-size:56px;
      margin:0;
    }
    .subtitle{
      font-size:28px;
      margin-top:12px;
      margin-bottom:28px;
      color:#e2e8f0;
    }
    .status{
      display:inline-block;
      padding:12px 20px;
      border:1px solid #334155;
      border-radius:14px;
      background:#111827;
      color:#cbd5e1;
      font-weight:600;
    }
    .copyright{
      margin-top:32px;
      font-size:12px;
      color:#64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="studio">Arcana Record Games</div>

    <h1 class="title">『アルカナレコード』</h1>
    <div class="subtitle">シリーズ 開発中</div>

    <div class="status">公式サイト準備中</div>

    <div class="copyright">© 2026 Arcana Record Games</div>
  </div>
</body>
</html>
