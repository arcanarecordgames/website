<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcana Record Games</title>

  <style>
    html, body{
      margin:0;
      min-height:100vh;
      height:100%;
    }

    body{
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0b1020;
      color:#f8fafc;
      font-family:"Noto Sans JP", sans-serif;
      text-align:center;
      padding:20px;
      box-sizing:border-box;
      overflow:hidden;
    }

    /* 流れ星を描く背景キャンバス */
    #starfield{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:0;
      pointer-events:none;
      display:block;
    }

    .container{
      position:relative;
      z-index:1;
      width:100%;
      max-width:900px;
      padding:24px;
    }

    .studio{
      color:#94a3b8;
      letter-spacing:0.2em;
      font-size:14px;
      margin-bottom:18px;
    }

    /* PROJECT STARTED */
    .project{
      display:inline-block;
      padding:6px 14px;
      border:1px solid #475569;
      border-radius:999px;
      color:#cbd5e1;
      font-size:12px;
      letter-spacing:0.18em;
      margin-bottom:8px;
      background:#111827;
    }

    .project-jp{
      color:#94a3b8;
      font-size:14px;
      margin-bottom:18px;
      letter-spacing:0.08em;
    }

/* タイトル（スマホ対応＋背景発光） */
.title{
  position:relative;
  display:inline-block;
  z-index:1;

  font-size:clamp(2.2rem, 8vw, 4.5rem);
  font-weight:700;
  letter-spacing:0.06em;
  margin:14px 0 12px;
  line-height:1.1;
  text-align:center;
  word-break:keep-all;
  color:#f8fafc;

  /* 文字の発光 */
  text-shadow:
    0 0 6px rgba(148,163,184,.35),
    0 0 14px rgba(96,165,250,.18),
    0 0 28px rgba(59,130,246,.10);
}

/* タイトルの真後ろに被さる光 */
.title::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);

  width:clamp(140px, 28vw, 220px);
  height:clamp(140px, 28vw, 220px);
  border-radius:50%;

  background:radial-gradient(
    circle,
    rgba(255,255,255,0.72) 0%,
    rgba(220,240,255,0.48) 14%,
    rgba(150,205,255,0.28) 34%,
    rgba(96,165,250,0.14) 56%,
    rgba(59,130,246,0.06) 72%,
    rgba(11,16,32,0) 86%
  );

  filter:blur(20px);
  z-index:-1;
  pointer-events:none;
}

/* 観測者識別番号 */
.observer-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  margin:6px 0 26px;
}

.observer-label{
  font-size:12px;
  letter-spacing:0.22em;
  color:#93c5fd;
}

.observer-id{
  padding:12px 22px;
  border:1px solid rgba(96,165,250,.28);
  border-radius:14px;
  background:rgba(15,23,42,.72);
  color:#f8fafc;
  font-size:clamp(1rem, 3vw, 1.35rem);
  font-weight:700;
  letter-spacing:0.14em;
  text-shadow:0 0 10px rgba(96,165,250,.22);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.03) inset,
    0 0 18px rgba(59,130,246,.12);
  backdrop-filter:blur(6px);
}

    .status{
      display:inline-block;
      padding:12px 20px;
      border:1px solid #334155;
      border-radius:14px;
      background:#111827;
      color:#cbd5e1;
      font-weight:600;
      min-width:220px;
      margin-top:18px;
    }

    .copyright{
      margin-top:32px;
      font-size:12px;
      color:#64748b;
    }

    .social-links{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:20px;
      margin-top:28px;
    }

    .social-links a{
      display:flex;
      justify-content:center;
      align-items:center;
      width:44px;
      height:44px;
      border:1px solid #334155;
      border-radius:50%;
      background:#111827;
      color:#cbd5e1;
      transition:transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      text-decoration:none;
    }

    .social-links a:active{
      transform:translateY(-1px);
    }

    @media (hover: hover) and (pointer: fine){
      .social-links a:hover{
        transform:translateY(-3px);
        border-color:#60a5fa;
        box-shadow:0 0 14px rgba(96,165,250,0.35);
        color:#f8fafc;
      }
    }

    .social-links svg{
      width:20px;
      height:20px;
      fill:currentColor;
    }

    /* 初期フラッシュ演出：白い光→中央の発光位置へ収束 */
    #intro-flash{
      position:fixed;
      inset:0;
      background: radial-gradient(
        circle at var(--flash-x, 50%) var(--flash-y, 38%),
        #ffffff 0%,
        #eaf4ff 30%,
        #c7e2ff 55%,
        #93c5fd 78%,
        #60a5fa 100%
      );
      z-index:50;
      pointer-events:none;
      clip-path: circle(150% at 50% 50%);
      opacity:1;
      transition:
        clip-path 1.15s cubic-bezier(.65, 0, .35, 1),
        opacity 1.15s ease;
    }

    #intro-flash.shrink{
      clip-path: circle(0% at var(--flash-x, 50%) var(--flash-y, 38%));
      opacity:0;
    }

    /* テキストのふわっとした順次表示 */
    @keyframes fadeInUp{
      from{
        opacity:0;
        transform:translateY(14px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .studio,
    .project,
    .project-jp,
    .title,
    .subtitle{
      opacity:0;
      animation: fadeInUp 0.8s ease forwards;
    }

    .studio{ animation-delay: 1.4s; }
    .project{ animation-delay: 1.6s; }
    .project-jp{ animation-delay: 1.75s; }
    .title{ animation-delay: 1.95s; }
    .subtitle{ animation-delay: 2.25s; }
  </style>
</head>

<body>
  <canvas id="starfield"></canvas>
  <div id="intro-flash"></div>

  <div class="container">
    <div class="studio">Arcana Record Games</div>

    <div class="project">PROJECT STARTED</div>
    <div class="project-jp">プロジェクト始動</div>

    <h1 class="title">『アルカナレコード』</h1>
    <div class="subtitle">シリーズ開発中</div>

<!-- 観測者識別番号 -->
<div class="observer-box">
  <div class="observer-label">観測者識別番号</div>
  <div id="observerId" class="observer-id">AR-26312-XXXX</div>
</div>

<div class="status">公式サイト公開中</div>
    <div class="social-links">
      <a href="https://x.com/arcanarecord" target="_blank" rel="noopener noreferrer" aria-label="公式X（旧Twitter）">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18.9 2H22l-7.6 8.7L23.3 22h-6.9l-5.4-6.6L4.8 22H1.6l8.2-9.3L1 2h7.1l4.9 6.1L18.9 2zm-1.2 18h1.9L7.4 4H5.4l12.3 16z"/>
        </svg>
      </a>
      <a href="https://www.youtube.com/@arcanarecord" target="_blank" rel="noopener noreferrer" aria-label="公式YouTube">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.6 15.6V8.4l6.3 3.6z"/>
        </svg>
      </a>
    </div>

    <div class="copyright">© Arcana Record Games</div>
  </div>

  <script>
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    function resize(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // 背景の静止した小さい星
    const bgStars = [];
    const BG_STAR_COUNT = 120;
    for(let i=0; i<BG_STAR_COUNT; i++){
      bgStars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.2,
        alpha: Math.random() * 0.6 + 0.2,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinklePhase: Math.random() * Math.PI * 2
      });
    }

    // 流れ星クラス
    // 4方向に伸びるキラキラ（✴︎風）の星形を描く
    function drawSparkle(ctx, cx, cy, outerRadius, innerRadius){
      const spikes = 4;
      const step = Math.PI / spikes;
      let rot = -Math.PI / 2;

      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
      for(let i=0; i<spikes; i++){
        rot += step;
        ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
        rot += step;
        ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
      }
      ctx.closePath();
    }

    class ShootingStar{
      constructor(){
        this.reset();
      }

      reset(){
        // 画面左上側からランダムに出現（左上 → 右下へ流れる）
        const startFromTop = Math.random() < 0.6;
        if(startFromTop){
          this.x = Math.random() * canvas.width * 0.6 - 100;
          this.y = -20;
        } else {
          this.x = -20;
          this.y = Math.random() * canvas.height * 0.5;
        }

        // 左上から右下方向への角度（角度に幅を持たせてバリエーションを出す）
        const angle = (Math.PI / 180) * (10 + Math.random() * 70); // 約10〜80度
        this.speed = Math.random() * 3 + 4;
        this.vx = Math.cos(angle) * this.speed;
        this.vy = Math.sin(angle) * this.speed;

        this.length = Math.random() * 180 + 160;
        this.thickness = Math.random() * 2 + 1.8;
        this.life = 1;
        this.decay = Math.random() * 0.006 + 0.004;
        this.active = true;

        // 出現までの待ち時間
        this.delay = Math.random() * 400;
      }

      update(){
        if(this.delay > 0){
          this.delay--;
          return;
        }

        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;

        if(this.life <= 0 || this.x > canvas.width + 200 || this.y > canvas.height + 200){
          // 次の流れ星までランダムな間隔を空けてリセット
          this.reset();
          this.delay = Math.random() * 500 + 200;
        }
      }

      draw(ctx){
        if(this.delay > 0) return;

        const tailX = this.x - this.vx * (this.length / this.speed);
        const tailY = this.y - this.vy * (this.length / this.speed);

        const gradient = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
        gradient.addColorStop(0, `rgba(220, 240, 255, ${this.life})`);
        gradient.addColorStop(0.3, `rgba(150, 205, 255, ${this.life * 0.6})`);
        gradient.addColorStop(1, `rgba(59, 130, 246, 0)`);

        ctx.save();
        ctx.strokeStyle = gradient;
        ctx.lineWidth = this.thickness;
        ctx.lineCap = 'round';
        ctx.shadowColor = 'rgba(150, 205, 255, 0.9)';
        ctx.shadowBlur = 16;

        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(tailX, tailY);
        ctx.stroke();

        // 先端の光る点（✴︎風のスパークル形）
        ctx.fillStyle = `rgba(255, 255, 255, ${this.life})`;
        ctx.shadowColor = 'rgba(220, 240, 255, 1)';
        ctx.shadowBlur = 20;
        drawSparkle(ctx, this.x, this.y, this.thickness * 3.2, this.thickness * 1.1);
        ctx.fill();

        ctx.restore();
      }
    }

    const STAR_COUNT = 3;
    const shootingStars = [];
    for(let i=0; i<STAR_COUNT; i++){
      const s = new ShootingStar();
      s.delay = Math.random() * 600;
      shootingStars.push(s);
    }

    function drawBackground(){
      // 背景色（コード内で二重指定して背景がにじまないように）
      ctx.fillStyle = '#0b1020';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 静止した星の瞬き
      for(const star of bgStars){
        star.twinklePhase += star.twinkleSpeed;
        const twinkle = (Math.sin(star.twinklePhase) + 1) / 2;
        ctx.beginPath();
        ctx.fillStyle = `rgba(226, 232, 240, ${star.alpha * (0.4 + twinkle * 0.6)})`;
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function animate(){
      drawBackground();

      for(const star of shootingStars){
        star.update();
        star.draw(ctx);
      }

      requestAnimationFrame(animate);
    }

    animate();

    // 初期フラッシュ：白い光がタイトル中央の発光位置へ収束する演出
    (function initFlash(){
      const flash = document.getElementById('intro-flash');
      const titleEl = document.querySelector('.title');

      function setFlashTarget(){
        const rect = titleEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        flash.style.setProperty('--flash-x', (cx / window.innerWidth * 100) + '%');
        flash.style.setProperty('--flash-y', (cy / window.innerHeight * 100) + '%');
      }

      setFlashTarget();

      // 少し白いフラッシュを見せてから収束を開始
      requestAnimationFrame(() => {
        setTimeout(() => {
          flash.classList.add('shrink');
        }, 200);
      });

      // アニメーション終了後は完全に非表示にしてクリックの妨げにならないようにする
      flash.addEventListener('transitionend', () => {
        flash.style.display = 'none';
      }, { once: true });
    })();
// 観測者識別番号（端末ごとに固定）
(function initObserverId(){
  const STORAGE_KEY = 'ar_observer_id';

  // 16進数4文字を生成
  function randomCode(length = 4){
    const chars = '0123456789ABCDEF';
    let result = '';
    for(let i = 0; i < length; i++){
      result += chars[Math.floor(Math.random() * chars.length)];
    }
    return result;
  }

  // 既存IDを取得
  let observerId = localStorage.getItem(STORAGE_KEY);

  // 初回アクセス時のみ生成
  if(!observerId){
    observerId = `AR-26312-${randomCode()}`;
    localStorage.setItem(STORAGE_KEY, observerId);
  }

  // 表示
  document.getElementById('observerId').textContent = observerId;
})();
  </script>
</body>
</html>
